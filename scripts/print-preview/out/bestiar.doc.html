<!DOCTYPE html><html lang="cs"><head><meta charset="utf-8">
<title>Tisk — náhled</title><style>/*
 * 14.7 pilíř A — tiskové CSS pro samostatné tiskové okno (viz usePrint).
 *
 * Princip (po sérii selhání CH-001…008, viz docs/chybovy-denik/tisk.md):
 * tiskne se ČISTÝ dokument na holém semantickém HTML klonu. CSS appky se do
 * okna ZÁMĚRNĚ NEkopíruje → odpadá SPA layout (height:100vh/overflow → prázdné
 * listy) i potřeba hrubých resetů (které rozbíjely obrázky). Stačí
 * element-level styl níže.
 *
 * Tento soubor je jediný zdroj pravdy: printMode.ts ho bere přes `?raw`,
 * offline náhled (scripts/print-preview) čte týž soubor → náhled = produkce.
 *
 * Černobíle (úspora toneru, čitelnost): barvu i pozadí srovnáme; hierarchii
 * nese velikost, tučnost a kurzíva, ne barva.
 */

/* — Reset na tisk: žádné barvy/pozadí/stíny zděděné z obsahu — */
* {
  color: #000 !important;
  background: transparent !important;
  box-shadow: none !important;
  text-shadow: none !important;
}

/* — Stránka — */
body {
  font-family: 'Crimson Pro', Georgia, 'Times New Roman', serif;
  font-size: 11.5pt;
  line-height: 1.5;
  color: #000;
  background: #fff;
  margin: 0;
}

/* — Nadpisy: hierarchie velikostí, drží se u následujícího obsahu — */
h1, h2, h3, h4, h5, h6 {
  font-family: 'Fraunces', Georgia, serif;
  line-height: 1.18;
  break-after: avoid;
  page-break-after: avoid;
  margin: 1.1em 0 0.4em;
}
h1 { font-size: 1.9rem; margin-top: 0; }
h2 { font-size: 1.4rem; border-bottom: 1px solid #ccc; padding-bottom: 0.15em; }
h3 { font-size: 1.15rem; }
h4 { font-size: 1rem; }

p { margin: 0.55em 0; orphans: 2; widows: 2; }

/* — Seznamy — */
ul, ol { padding-left: 1.5rem; margin: 0.5em 0; }
li { margin: 0.2rem 0; }

/* — Odkazy: bez modré, jen podtržení (tisk) — */
a { color: #000; text-decoration: underline; }

/* — Citace: vizuálně odlišená i bez barvy (levý pruh + kurzíva) — */
blockquote {
  margin: 0.8em 0;
  padding: 0.2em 0 0.2em 1rem;
  border-left: 3px solid #999;
  font-style: italic;
  break-inside: avoid;
}

/* — Obrázky a figury: nelámat přes stránku, rozumný strop výšky —
     obsahové obrázky/mapy drží max-width:100 % + strop výšky; poměr stran
     zachová width:auto. */
img {
  max-width: 100% !important;
  max-height: 9cm;
  width: auto;
  height: auto !important;
  break-inside: avoid;
}
figure { margin: 0.8em 0; break-inside: avoid; }
figcaption { font-size: 0.85rem; font-style: italic; margin-top: 0.3em; }

/* — Portrét postavy (hero/aside): menší než obsahové obrázky, ať nezabere
     půl stránky. Cílená třída — obecné `img` (mapy, ilustrace) zůstává větší. */
.print-portrait { max-height: 6cm !important; }

/* — Hero obrázek stránky (Lokace/Ostatní): nahoře nad textem, ale ne přes
     celou šířku. Vystředěný, rozumný strop. */
.print-hero {
  display: block;
  margin: 0 auto 0.8rem;
  max-height: 7cm !important;
  max-width: 12cm !important;
}

/* — Tisk „všech záložek": každá záložka na vlastní stránce (kromě první,
     která sdílí list s hero/profilem). */
.print-page { break-before: page; }
.print-page:first-child { break-before: auto; }

/* — Definiční seznamy (profil postavy, atributy): „Label: hodnota" na řádku.
     Bez CSS appky se `dt`/`dd` rozpadají pod sebe (label nad hodnotou). */
dl { margin: 0.6em 0; }
dl > div { display: flex; gap: 0.5rem; align-items: baseline; margin: 0.18rem 0; break-inside: avoid; }
dt { font-weight: 600; }
dt::after { content: ':'; }
dd { margin: 0; }

/* — Tiskový nadpis sekce: collapsible header je <button> (skrytý v tisku),
     tohle ho nahrazuje jako čitelný nadpis (viz InventoryTab printMode). */
.print-section-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.15rem;
  margin: 0.9em 0 0.3em;
  break-after: avoid;
}
.print-section-meta { font-size: 0.85rem; font-weight: 400; }

/* — Řádek s hodnotou vpravo (položka výbavy: název ⟷ ×N; Matrix pips) — */
.print-row { display: flex; justify-content: space-between; gap: 1rem; }

/* — Kompaktní stat „Label hodnota" s mezerou (bestie staty/schopnosti) —
     jen mezera mezi label a hodnotou, BEZ roztažení přes celou šířku. */
.print-stat { display: flex; gap: 0.4rem; align-items: baseline; }

/* — Seznam bez odrážek (Matrix tiskový deník: přetlaky/jazyky/schopnosti
     jsou řádky label–hodnota, ne výčet). — */
.matrix-print__plain { list-style: none; padding-left: 0; }

/* — Tabulky — */
table { border-collapse: collapse; width: 100%; margin: 0.6em 0; break-inside: avoid; }
caption { font-weight: 600; text-align: left; margin-bottom: 0.3em; }
th, td { border: 1px solid #999; padding: 4px 9px; text-align: left; vertical-align: top; }
thead { display: table-header-group; } /* hlavička se opakuje na každé stránce */

hr { border: none; border-top: 1px solid #bbb; margin: 1em 0; }

/* — Tiskem skrývané prvky + interaktivní ovládání — */
.print-hide, [data-print-hide], button, input, select, textarea {
  display: none !important;
}

/* — Kalendář: každý měsíc na vlastní stránku (z 14.7b) — */
.print-month { break-after: page; }
.print-month:last-child { break-after: auto; }

/* — Kalendář: mřížka. `display:grid` je v CSS modulu appky (v tisku zmizí) →
     buňky by se rozpadly do sloupce. `gridTemplateColumns` přežívá (inline
     style), tady obnovíme `display:grid` + rámečky buněk. */
.print-cal-grid { display: grid !important; gap: 2px; }
.print-cal-grid > * {
  border: 1px solid #ccc;
  padding: 2px 3px;
  min-height: 1.8cm;
  font-size: 8pt;
  break-inside: avoid;
  overflow: visible !important;
}

/* — Kalendář: událost (akce). Přebíjí button{display:none} a ukáže název
     s barevným proužkem vlevo (--chip-color z inline style chipu). Bez toho
     se v tisku tisknou jen prázdné barevné proužky bez názvů. */
.print-event {
  display: block !important;
  border-left: 3px solid var(--chip-color, #888);
  padding: 1px 5px;
  margin: 1px 0;
  font-size: 8.5pt;
  line-height: 1.25;
  text-align: left;
  white-space: normal;
  break-inside: avoid;
}

/* — Volitelná tisková utilita: mřížku karet (atributy bestie/postavy) lze
     v tisku zachovat přidáním stabilní třídy `print-cols` do komponenty
     (CSS-module hash třídy v tisku nestylují). Bez ní obsah teče lineárně. */
.print-cols {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem 1rem;
}
.print-cols > * { break-inside: avoid; }
</style></head>
<body><!-- Fixture: BestieCard v tisku (data-print-scope = BestiarPage).
     Staty (EntityStatbar) a schopnosti mají print-stat → „Label hodnota"
     s mezerou (dřív nalepené: MAX HP5, Zbroj0, síla2). -->
<div class="_page_x">

      <img alt="Duch"
        src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='300' height='380'%3E%3Crect width='300' height='380' fill='%23223'/%3E%3Cellipse cx='150' cy='150' rx='70' ry='110' fill='%238fd' opacity='0.5'/%3E%3C/svg%3E" />
    </div>
    <div class="_body_a3">
      <h4 class="_name_a4">Duch</h4>
      <div class="_statbar_a5">
        <section class="_section_a6">
          <div class="_fieldsList_a7">
            <div class="_statBar_a8">
              <div class="_statBarHeader_a9 print-stat">
                <span class="_statLabel_b1">MAX HP</span>

            <div class="_statRow_b3 print-stat"><span class="_statLabel_b1">Zbroj</span><span class="_statValue_b2">0</span></div>
            <div class="_statRow_b3 print-stat"><span class="_statLabel_b1">Pohyb</span><span class="_statValue_b2">4</span></div>
            <div class="_statRow_b3 print-stat"><span class="_statLabel_b1">Iniciativa</span><span class="_statValue_b2">0</span></div>

        <li class="_ability_c2 print-stat"><span class="_abilityLabel_c3">Nemrtvá síla</span><span class="_abilityValue_c4">2</span></li>
        <li class="_ability_c2 print-stat"><span class="_abilityLabel_c3">Ledový dotek</span><span class="_abilityValue_c4">4</span></li>
        <li class="_ability_c2 print-stat"><span class="_abilityLabel_c3">Zranitelnost stříbro</span><span class="_abilityValue_c4">-1</span></li>

</body></html>
