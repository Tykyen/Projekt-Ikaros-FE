\* TLC konfigurace pro MapReconnect.tla
\*
\* DŮKAZ VE DVOU BĚZÍCH — přepni RefetchOnReconnect a porovnej výsledek:
\*
\*   FALSE -> TLC ohlásí "Invariant Convergence is violated" + konkrétní trace
\*            (Disconnect -> ServerOp -> Reconnect -> klient pozadu). To je K-S bug.
\*   TRUE  -> žádné porušení; Safety i Convergence drží do hranice MaxOps.
\*
\* Spuštění (potřebuje tla2tools.jar nebo TLA+ Toolbox):
\*   java -cp tla2tools.jar tlc2.TLC -config MapReconnect.cfg MapReconnect.tla

SPECIFICATION Spec

CONSTANTS
  MaxOps = 3
  RefetchOnReconnect = FALSE

INVARIANT Safety
INVARIANT Convergence

\* Temporal property (zapni pro běh s RefetchOnReconnect = TRUE):
\* PROPERTY Liveness
