\* TLC konfigurace pro money.tla (M-TLA, race-condition audit 15. styl).
\*
\* Ověřuje NoOverdraft (žádný účet do mínusu) pro PLNOU spec (Transfer i Debit),
\* tj. přesně ten invariant, který by neatomický „read -> compute -> write"
\* (RC-E1/E3) porušil. MoneyConserved NENÍ zařazen jako invariant zde — Debit je
\* úmyslné zmenšení celkové sumy (viz komentář v money.tla u MoneyConserved),
\* takže by proti plné spec (s Debitem) vždy „spadl" i na správné implementaci.
\* Ověření zachování sumy PŘI ČISTÝCH transferech (bez Debitu) by vyžadovalo
\* samostatný Next (jen Transfer) — netriviální rozšíření modulu, mimo scope
\* tohoto běhu; pokud bude potřeba, přidat `money_transfer_only.tla`.
\*
\* Spuštění:
\*   java -jar tla2tools.jar -config money.cfg money.tla

SPECIFICATION Spec

CONSTANTS
  Accounts = {a1, a2, a3}
  MaxAmount = 2
  InitBalance = 3

INVARIANT TypeOK
INVARIANT NoOverdraft

\* Model je konečná scratch-pad hra o peníze — v dosažitelném stavu se všechny
\* účty legitimně vyprázdní (bal = 0 všude), pak žádná akce Next už neplatí.
\* To NENÍ bug (žádný overdraft, žádná ztráta invariantu) — je to jen konec
\* hry. Bez tohoto přepínače TLC hlásí "Deadlock reached" na tomto terminálním
\* stavu a přeruší run, i když NoOverdraft/TypeOK nikdy neselhaly.
CHECK_DEADLOCK FALSE
