<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>19.3 · Nábory — 12 motivů lístku</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;600;700&family=Cinzel:wght@600;800&family=EB+Garamond:ital@0;1&family=Pirata+One&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Playfair+Display:wght@700;900&family=Rye&family=Special+Elite&display=swap" rel="stylesheet">
<!-- Náhled linkuje REÁLNÝ naborSkins.css appky → vždy zrcadlí produkci (0 duplikace). -->
<link rel="stylesheet" href="../../src/features/ikaros/components/naborSkins.css">
<style>
/* Deska = globální skin diváka (přepínatelná). Lístky = motiv světa (fixní). */
:root{ --bg-1:#0c1230; --bg-2:#1a2350; --glow: rgba(120,150,255,.4); }
[data-skin="pergamen"]{ --bg-1:#1a0e04; --bg-2:#28190a; --glow: rgba(212,169,70,.4); }
[data-skin="temna"]{ --bg-1:#0a0307; --bg-2:#160a0f; --glow: rgba(168,19,46,.4); }

*{box-sizing:border-box;margin:0;padding:0}
body{ font-family:'Rajdhani',system-ui,sans-serif; }
.board{
  min-height:100vh; padding:clamp(16px,3vw,40px);
  background-color:var(--bg-2);
  background-image:
    radial-gradient(1100px 420px at 50% -8%, var(--glow), transparent 62%),
    linear-gradient(180deg, var(--bg-1), var(--bg-2) 70%);
  transition:background-color .4s ease;
}
.top{ max-width:1280px; margin:0 auto 22px; display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end; justify-content:space-between; }
.top h1{ font-family:'Cinzel',serif; font-size:clamp(24px,4vw,40px); color:#fff; text-shadow:0 2px 20px var(--glow); }
.top p{ color:rgba(255,255,255,.7); font-size:14px; margin-top:6px; max-width:60ch; }
.skins{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
.skins span{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.55); }
.skins .row{ display:flex; gap:6px; }
.sp{ font:600 13px 'Rajdhani',sans-serif; padding:7px 14px; border-radius:999px; cursor:pointer; border:1px solid rgba(255,255,255,.25); background:rgba(255,255,255,.06); color:#fff; }
.sp[aria-pressed="true"]{ background:#fff; color:#111; }

.grid{ max-width:1280px; margin:0 auto; column-count:3; column-gap:22px; }
@media(max-width:1000px){ .grid{ column-count:2 } }
@media(max-width:640px){ .grid{ column-count:1 } }

/* ── skeleton lístku (= NaborListek.module.css, inline kopie pro standalone náhled) ── */
.card{
  position:relative; break-inside:avoid; margin:0 0 24px; padding:18px;
  display:flex; flex-direction:column; border-radius:10px;
  font-family:var(--font-body,serif); color:var(--theme-text);
  background:var(--theme-surface); border:1px solid var(--theme-border);
  box-shadow:0 3px 6px -2px rgba(0,0,0,.4), 0 14px 30px -12px rgba(0,0,0,.55);
}
.motiv-name{ font:700 10px 'Rajdhani',sans-serif; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,.4); margin:0 0 6px 4px; }
.side{ align-self:flex-start; display:inline-flex; padding:4px 10px; margin-bottom:10px; border-radius:999px; font:700 11px 'Rajdhani',sans-serif; letter-spacing:.1em; text-transform:uppercase; }
.side[data-strana="hledam-hrace"]{ background:var(--theme-accent); color:var(--text-on-accent,#050508); }
.side[data-strana="hledam-hru"]{ background:transparent; color:var(--theme-accent-bright); border:1px solid var(--theme-border); }
.title{ font-family:var(--font-display,serif); font-size:20px; line-height:1.15; color:var(--theme-heading); margin-bottom:4px; }
.meta{ display:flex; flex-wrap:wrap; gap:6px 14px; margin:10px 0; font-size:13px; color:var(--theme-text-muted); }
.k b{ color:var(--theme-text); font-weight:600; }
.seats{ display:inline-flex; gap:3px; align-items:center; }
.seats i{ width:9px; height:9px; border-radius:50%; border:1px solid var(--theme-accent); }
.seats i.full{ background:var(--theme-accent); }
.body{ font-size:14px; line-height:1.5; margin:6px 0 14px; opacity:.92; }
.foot{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:auto; }
.who{ font-size:12px; color:var(--theme-text-muted); }
.who b{ color:var(--theme-text); }
.reply{ font:700 13px 'Rajdhani',sans-serif; padding:8px 14px; border:none; border-radius:8px; cursor:pointer; background:var(--theme-accent); color:var(--text-on-accent,#050508); }
</style>
</head>
<body>
<div class="board" id="board">
  <header class="top">
    <div>
      <h1>Nábory — 12 motivů lístku</h1>
      <p>Každý lístek nese <b>motiv svého světa</b> (tvar + font + barva). Deska pod nimi = <b>globální skin diváka</b>. Přepni skin vpravo → deska změní barvu, lístky drží svůj motiv. (Tvary linkované z reálného <code>naborSkins.css</code>.)</p>
    </div>
    <div class="skins">
      <span>Globální skin (deska)</span>
      <div class="row">
        <button class="sp" data-set="" aria-pressed="true">Modré nebe</button>
        <button class="sp" data-set="pergamen" aria-pressed="false">Pergamen</button>
        <button class="sp" data-set="temna" aria-pressed="false">Temná červeň</button>
      </div>
    </div>
  </header>

  <main class="grid" id="grid"></main>
</div>

<script>
const M = [
  ['ikaros','Ikaros', {s:'rgba(20,12,44,.9)',ss:'rgba(10,6,26,.94)',t:'#ece4ff',h:'#ffffff',a:'#a96cff',ab:'#c9a4ff',ad:'#3a2470',b:'rgba(169,108,255,.5)',bs:'rgba(169,108,255,.26)',g:'rgba(169,108,255,.5)',c:'#c9a4ff',oa:'#0c0820',fd:'Orbitron',fb:'Rajdhani'},
    {strana:'hledam-hrace',title:'Runner hledá tým',sys:'Shadowrun 6',mode:'Online · Foundry',seats:'2/5',who:'Nyx · před 1 h'}],
  ['fantasy','Fantasy', {s:'rgba(16,32,22,.92)',ss:'rgba(10,22,14,.95)',t:'#dbe8d6',h:'#eafff0',a:'#3fae6a',ab:'#6ad090',ad:'#183a24',b:'rgba(63,174,106,.5)',bs:'rgba(63,174,106,.28)',g:'rgba(63,174,106,.4)',c:'#6ad090',oa:'#08160e',fd:'Cinzel',fb:'EB Garamond'},
    {strana:'hledam-hrace',title:'Kronika Aldbaru',sys:'Dračí doupě+',mode:'Online · Discord',seats:'3/6',who:'PJ Sirien · včera'}],
  ['dark-fantasy','Dark Fantasy', {s:'rgba(22,10,12,.94)',ss:'rgba(14,6,8,.96)',t:'#d8ccce',h:'#ecd6ce',a:'#b03030',ab:'#d64848',ad:'#3a1414',b:'rgba(170,130,130,.42)',bs:'rgba(120,80,80,.3)',g:'rgba(176,48,48,.4)',c:'#d64848',oa:'#ffffff',fd:'Pirata One',fb:'Cormorant Garamond'},
    {strana:'hledam-hrace',title:'Stíny nad Pustinou',sys:'DrD 1.6',mode:'Naživo · Praha',seats:'3/5',who:'PJ Krolok · 2 h'}],
  ['vesmir','Sci-Fi', {s:'rgba(8,18,30,.93)',ss:'rgba(4,10,20,.96)',t:'#cfe6f0',h:'#eaf6ff',a:'#2e9fd8',ab:'#4fd4e4',ad:'#0a2438',b:'rgba(79,140,200,.5)',bs:'rgba(79,140,200,.28)',g:'rgba(79,212,228,.4)',c:'#4fd4e4',oa:'#04101c',fd:'Orbitron',fb:'Rajdhani'},
    {strana:'hledam-hru',title:'Hledám stůl na stanici',sys:'Cokoli sci-fi',mode:'Online',seats:'',who:'Halgar · 3 dny'}],
  ['cyberpunk','Cyberpunk', {s:'rgba(16,16,10,.94)',ss:'rgba(8,8,4,.96)',t:'#e8e6d0',h:'#fff6c0',a:'#e8c020',ab:'#ffe040',ad:'#3a3208',b:'rgba(232,192,32,.5)',bs:'rgba(232,192,32,.28)',g:'rgba(232,192,32,.4)',c:'#ffe040',oa:'#0a0a04',fd:'Orbitron',fb:'Rajdhani'},
    {strana:'hledam-hru',title:'Decker shání partu',sys:'CP Red',mode:'Online',seats:'',who:'V · 4 h'}],
  ['steampunk','Steampunk', {s:'rgba(30,22,12,.93)',ss:'rgba(20,14,8,.96)',t:'#e8d8b8',h:'#f0d890',a:'#c08828',ab:'#e0a840',ad:'#3a2810',b:'rgba(192,136,40,.5)',bs:'rgba(192,136,40,.28)',g:'rgba(192,136,40,.4)',c:'#e0a840',oa:'#1a1208',fd:'Cinzel',fb:'EB Garamond'},
    {strana:'hledam-hrace',title:'Aeronauti nad Prahou',sys:'Vlastní',mode:'Naživo · Praha',seats:'1/4',who:'PJ Cog · 5 h'}],
  ['apokalypsa','Post-apokalypsa', {s:'rgba(24,22,14,.93)',ss:'rgba(16,14,8,.96)',t:'#d8d0b0',h:'#e4d494',a:'#8a9a3a',ab:'#aab850',ad:'#2a3014',b:'rgba(138,154,58,.5)',bs:'rgba(138,154,58,.28)',g:'rgba(138,154,58,.4)',c:'#aab850',oa:'#12100a',fd:'Special Elite',fb:'Special Elite'},
    {strana:'hledam-hrace',title:'Karavana do Zóny',sys:'Mutant',mode:'Online',seats:'2/5',who:'PJ Rad · 6 h'}],
  ['horor','Horor', {s:'rgba(16,12,14,.95)',ss:'rgba(8,6,8,.97)',t:'#cac0c4',h:'#dcc8cc',a:'#8a3038',ab:'#b04048',ad:'#2a1014',b:'rgba(120,90,95,.4)',bs:'rgba(120,90,95,.24)',g:'rgba(138,48,56,.4)',c:'#b04048',oa:'#ffffff',fd:'Playfair Display',fb:'EB Garamond'},
    {strana:'hledam-hrace',title:'Dům na kopci',sys:'Zew Cthulhu',mode:'Naživo · Brno',seats:'1/4',who:'PJ Miku · 5 h'}],
  ['mystery','Mystery', {s:'rgba(16,18,26,.94)',ss:'rgba(10,12,18,.97)',t:'#c8d0dc',h:'#dce4f0',a:'#5a6ab0',ab:'#8090d0',ad:'#161c34',b:'rgba(100,120,180,.42)',bs:'rgba(100,120,180,.26)',g:'rgba(90,106,176,.4)',c:'#8090d0',oa:'#0a0c12',fd:'Special Elite',fb:'EB Garamond'},
    {strana:'hledam-hru',title:'Detektiv hledá případ',sys:'Gumshoe',mode:'Online',seats:'',who:'Nick · 2 dny'}],
  ['historie','Historický', {s:'rgba(30,24,14,.93)',ss:'rgba(20,16,8,.96)',t:'#e8dab0',h:'#f0c860',a:'#c8a038',ab:'#f0c860',ad:'#3a2c10',b:'rgba(200,160,56,.5)',bs:'rgba(200,160,56,.28)',g:'rgba(200,160,56,.4)',c:'#f0c860',oa:'#1a1408',fd:'Cinzel',fb:'EB Garamond'},
    {strana:'hledam-hrace',title:'Dvůr krále Karla',sys:'GURPS',mode:'Naživo · Praha',seats:'2/6',who:'PJ Kron · včera'}],
  ['moderni','Současnost', {s:'rgba(24,26,30,.93)',ss:'rgba(16,18,22,.97)',t:'#dce0e6',h:'#f0f2f6',a:'#4a90e2',ab:'#6aaef8',ad:'#122438',b:'rgba(120,130,145,.35)',bs:'rgba(120,130,145,.2)',g:'rgba(74,144,226,.35)',c:'#6aaef8',oa:'#ffffff',fd:'system-ui',fb:'system-ui'},
    {strana:'hledam-hru',title:'Hráč shání městskou hru',sys:'Vampire',mode:'Online',seats:'',who:'Alex · 1 h'}],
  ['western','Western', {s:'rgba(28,20,12,.94)',ss:'rgba(18,12,6,.97)',t:'#e0d0b0',h:'#f0dcb0',a:'#b06828',ab:'#d08840',ad:'#3a2410',b:'rgba(176,104,40,.5)',bs:'rgba(176,104,40,.28)',g:'rgba(176,104,40,.4)',c:'#d08840',oa:'#1a1006',fd:'Rye',fb:'Special Elite'},
    {strana:'hledam-hrace',title:'Hledá se posila do posse',sys:'Deadlands',mode:'Naživo · Ostrava',seats:'3/5',who:'PJ Cassidy · 3 h'}],
];

function seatDots(str){ if(!str) return ''; const [t,tot]=str.split('/').map(Number); let d=''; for(let i=0;i<tot;i++) d+=`<i class="${i<t?'full':''}"></i>`; return `<span class="k">Místa: <span class="seats">${d}</span> ${str}</span>`; }

document.getElementById('grid').innerHTML = M.map(([id,name,p,d])=>{
  const vars=`--theme-surface:${p.s};--theme-surface-strong:${p.ss};--theme-text:${p.t};--theme-text-muted:${p.t}bb;--theme-heading:${p.h};--theme-accent:${p.a};--theme-accent-bright:${p.ab};--theme-accent-dim:${p.ad};--theme-border:${p.b};--theme-border-soft:${p.bs};--theme-glow-gold:${p.g};--theme-glow-cyan:${p.g};--theme-accent-cyan:${p.c};--text-on-accent:${p.oa};--white-rgb:255 255 255;--black-rgb:0 0 0;--font-display:'${p.fd}',serif;--font-body:'${p.fb}',serif;`;
  const stranaLabel = d.strana==='hledam-hrace'?'Hledám hráče':'Hledám hru';
  return `<div data-nabor-motiv="${id}"><div class="motiv-name">${name}</div>
    <article class="card" data-nabor-card data-strana="${d.strana}" style="${vars}">
      <span class="side" data-nabor-side data-strana="${d.strana}">${stranaLabel}</span>
      <h3 class="title" data-nabor-title>${d.title}</h3>
      <div class="meta"><span class="k">Systém: <b>${d.sys}</b></span><span class="k">${d.mode}</span>${seatDots(d.seats)}</div>
      <p class="body">Ukázkový text náboru — jak vypadá lístek v motivu „${name}". Barvu i tvar drží motiv světa.</p>
      <div class="foot"><span class="who"><b>${d.who.split(' · ')[0]}</b> · ${d.who.split(' · ')[1]||''}</span><button class="reply">Ozvat se</button></div>
    </article></div>`;
}).join('');

document.querySelectorAll('.sp').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sp').forEach(x=>x.setAttribute('aria-pressed','false'));
  b.setAttribute('aria-pressed','true');
  const s=b.dataset.set;
  if(s) document.getElementById('board').dataset.skin=s; else delete document.getElementById('board').dataset.skin;
}));
</script>
</body>
</html>
