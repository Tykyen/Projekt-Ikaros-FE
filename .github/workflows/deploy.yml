name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production

env:
  DEPLOY_PATH: /opt/projekt-ikaros-fe

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      actions: read # 23.7 — gate čte stav CI běhů přes gh api

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # 23.7 — „deploy jen po zelené": deploy je workflow_dispatch bez vazby na
      # CI. Tenhle krok najde CI běh pro přesně tenhle commit (head_sha=HEAD) a
      # pustí dál JEN když je completed+success. Jinak deploy padne dřív, než se
      # sáhne na server. Po pushi na main nech CI doběhnout, teprve pak deploy.
      - name: Require green CI for HEAD
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "HEAD = $SHA"
          RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$SHA&per_page=1" \
            --jq '.workflow_runs[0] | "\(.status) \(.conclusion) \(.html_url)"' 2>/dev/null || echo "none none none")
          STATUS=$(printf '%s' "$RUN" | awk '{print $1}')
          CONCLUSION=$(printf '%s' "$RUN" | awk '{print $2}')
          URL=$(printf '%s' "$RUN" | awk '{print $3}')
          echo "CI: status=$STATUS conclusion=$CONCLUSION $URL"
          if [ "$STATUS" != "completed" ] || [ "$CONCLUSION" != "success" ]; then
            echo "::error::Deploy zablokován — CI pro HEAD ($SHA) není zelené (status=$STATUS, conclusion=$CONCLUSION). Počkej na zelenou CI a spusť deploy znovu."
            exit 1
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "mkdir -p ${{ env.DEPLOY_PATH }}"

      - name: Copy files to server
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ vars.SERVER_PORT }}" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.env' \
            ./ ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/

      # 14.3 — BACKEND_HOST pro nginx CSP (connect-src/img-src): holý host
      # odvozený z VITE_API_URL (jeden zdroj pravdy) — strip schématu + cesty.
      # Host bez schématu kryje v connect-src https (REST/polling) i wss (Socket.IO).
      - name: Derive BACKEND_HOST from VITE_API_URL
        id: backend
        run: |
          HOST=$(printf '%s' "${{ vars.VITE_API_URL }}" | sed -E 's#^[a-z]+://##; s#/.*$##')
          echo "host=$HOST" >> "$GITHUB_OUTPUT"

      # 23.4 — SENTRY_HOST pro nginx CSP (connect-src): holý ingest host odvozený
      # z VITE_SENTRY_DSN (jeden zdroj pravdy) — strip schématu + klíče (user@) + cesty.
      # Prázdný DSN → prázdný host → CSP beze změny (tracking vypnutý).
      - name: Derive SENTRY_HOST from VITE_SENTRY_DSN
        id: sentry
        run: |
          HOST=$(printf '%s' "${{ vars.VITE_SENTRY_DSN }}" | sed -E 's#^[a-z]+://##; s#^[^@]*@##; s#/.*$##')
          echo "host=$HOST" >> "$GITHUB_OUTPUT"

      - name: Create .env file on server
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cat > ${{ env.DEPLOY_PATH }}/.env << 'EOF'
          FRONTEND_PORT=${{ vars.FRONTEND_PORT }}
          VITE_API_URL=${{ vars.VITE_API_URL }}
          VITE_TURNSTILE_SITE_KEY=${{ vars.VITE_TURNSTILE_SITE_KEY }}
          VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
          BACKEND_HOST=${{ steps.backend.outputs.host }}
          SENTRY_HOST=${{ steps.sentry.outputs.host }}
          CSP_HEADER_NAME=${{ vars.CSP_HEADER_NAME }}
          EOF"

      - name: Build images
        id: build_images
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} bash -c '
            set -e
            cd ${{ env.DEPLOY_PATH }}
            docker image prune -f
            # Build cache: `--no-cache` build ji regeneruje při KAŽDÉM deployi;
            # bez tohohle rostla do ~50 GB (disk 85 % plný, alert). image prune
            # ji nemaže (jen dangling images) → nutný samostatný builder prune.
            docker builder prune -f
            # --no-cache: Docker jinak reusoval starý FE build layer (COPY . . +
            # npm run build) i po rsyncu nového kódu → server servíroval stale
            # bundle (build proběhl za ~46 s = cache hit). Plný rebuild = jistota,
            # že se nasadí aktuální commit. Deploy je ruční/občasný, pár min navíc OK.
            docker compose build --no-cache
          '

      - name: Deploy
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} bash -c '
            set -e
            cd ${{ env.DEPLOY_PATH }}
            docker compose down --remove-orphans || true
            docker compose up -d
            docker compose ps
          '

      - name: Verify deployment
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} bash -c '
            set -e
            cd ${{ env.DEPLOY_PATH }}
            sleep 5
            docker compose ps
            TOTAL=$(docker compose ps -q | wc -l)
            RUNNING=$(docker compose ps --status running -q | wc -l)
            if [ "$TOTAL" -ne "$RUNNING" ]; then
              docker compose logs --tail=50
              exit 1
            fi
          '

      # 23.7 — release evidence: co a kdy se nasadilo (sha + čas + kdo) do run
      # summary. Spolu s novinka-changelogem (25.4) tvoří stopu releasu.
      - name: Release evidence
        if: success()
        run: |
          {
            echo "### 🚀 Release evidence (FE)"
            echo ""
            echo "| Pole | Hodnota |"
            echo "|---|---|"
            echo "| commit | \`$(git rev-parse HEAD)\` |"
            echo "| ref | ${{ github.ref_name }} |"
            echo "| environment | ${{ github.event.inputs.environment }} |"
            echo "| deployed_at (UTC) | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo "| actor | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup old Docker images + build cache
        # `always()` dřív běžel i když gate zablokoval deploy (SSH known_hosts
        # přeskočen → „Host key verification failed" — matoucí červený krok,
        # který maskoval skutečnou příčinu). Teď: jen pokud proběhl build.
        if: always() && steps.build_images.outcome != 'skipped'
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "docker image prune -f && docker builder prune -f"
