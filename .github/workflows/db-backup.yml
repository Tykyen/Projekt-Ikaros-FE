name: DB Backup (Mongo)

# Ruční záloha produkční MongoDB (D-AUDIT „nula DB záloh").
# mongodump --archive --gzip do /opt/backups/mongo/ + retence + disková pojistka.
# ZÁMĚRNĚ jen workflow_dispatch (ruční): zálohy leží na TOMTÉŽ disku jako Mongo —
# automatický cron zapnout až po vyřešení cíle mimo server (rclone/B2/R2),
# viz docs/ops-runbook.md §6 v BE repu. Bez off-site cíle by cron jen plnil disk.
on:
  workflow_dispatch:
    inputs:
      keep:
        description: "Kolik posledních záloh ponechat (retence)"
        required: true
        default: "5"
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Záloha + retence
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} bash -s -- "${{ github.event.inputs.keep }}" << 'ENDSSH'
          set -e
          KEEP="${1:-5}"
          BACKUP_DIR=/opt/backups/mongo
          mkdir -p "$BACKUP_DIR"

          echo "===== disková pojistka (potřeba >= 3 GB volných) ====="
          AVAIL_KB=$(df --output=avail / | tail -1 | tr -d ' ')
          echo "volné: $((AVAIL_KB / 1024 / 1024)) GB"
          if [ "$AVAIL_KB" -lt 3145728 ]; then
            echo "MÁLO MÍSTA (< 3 GB) — záloha by mohla zaplnit disk. Konec bez zálohy."
            echo "Spusť nejdřív workflow 'Server Disk Cleanup'."
            exit 1
          fi

          STAMP=$(date +%F-%H%M)
          FILE="$BACKUP_DIR/ikaros-$STAMP.archive.gz"
          echo "===== mongodump → $FILE ====="
          docker exec projekt-ikaros-mongo mongodump --archive --gzip --db ikaros > "$FILE"
          ls -lh "$FILE"

          echo "===== integrita (gzip test + neprázdný) ====="
          gzip -t "$FILE"
          [ -s "$FILE" ] || { echo "PRÁZDNÁ ZÁLOHA"; rm -f "$FILE"; exit 1; }

          echo "===== retence (ponechat posledních $KEEP) ====="
          ls -1t "$BACKUP_DIR"/ikaros-*.archive.gz | tail -n +$((KEEP + 1)) | xargs -r rm -v --

          echo "===== stav záloh ====="
          ls -lh "$BACKUP_DIR"
          df -h /
          ENDSSH
