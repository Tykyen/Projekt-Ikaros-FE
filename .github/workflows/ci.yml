name: CI

# 16. audit (anti-regression), Fáze B1: první živá CI síť pro FE.
# Dosud FE nemělo ŽÁDNÝ CI ani precommit → build/lint/test nikdo nehlídal na PR (AR-04).
#
# Co ZATÍM NENÍ:
#  - cross-repo scannery (routes/ws/config/errors/logs): potřebují BE checkout → job audit-crossrepo
#    níže (zakomentován — čeká na název BE repo + token, AR-10).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend build, lint & nav audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b + vite)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Nav audit (FE-only scanner)
        run: npm run audit:nav

      # 14.6 SCA: blokuje na prod high+critical (npm audit) s DOKUMENTOVANÝM
      # allowlistem s expirací (scripts/check-sca.mjs) — propustí jen advisory,
      # co se naší architektury netýká a nemá vydaný fix. Dev/build → Dependabot.
      - name: SCA — npm audit (prod závislosti)
        run: SCA_TODAY=$(date -u +%F) npm run audit:sca

  frontend-test:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    # 23.7 sharding — 2729 testů běží sériově (fileParallelism:false, protože 6
    # testů bylo v parallelu flaky přes sdílené globály — jotai/vi.mock). Na
    # JEDNOM runneru to trvalo ~18 min a blokovalo deploy gate. Rozdělením na
    # `--shard` běží každý shard pořád sériově (0 flaky) na VLASTNÍM runneru
    # paralelně → wall-clock ~18/N min. Gate čte konkluzi CELÉHO workflow
    # (všechny shardy musí projít), takže je sharding transparentní.
    # fail-fast:false → padne-li jeden shard, ostatní dojedou (lepší diagnostika).
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run vitest (shard ${{ matrix.shard }}/4)
        run: |
          npm ci
          npm run test:run -- --shard=${{ matrix.shard }}/4

  # --- 14.5: FE E2E smoke (Playwright). BE mockovaný v testu → žádný backend/DB. ---
  frontend-e2e:
    name: Frontend E2E smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build (artefakt pro vite preview)
        run: npm run build

      - name: Run E2E smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # --- Cross-repo scannery (AR-10): FE↔BE kontrakt; BE checkout vedle (Tykyen/Projekt-ikaros je public → bez tokenu) ---
  audit-crossrepo:
    name: FE↔BE contract scanners
    runs-on: ubuntu-latest
    # Gate: běží JEN když je nastaven repo variable ENABLE_CROSSREPO_AUDIT='true'
    # + secret BE_REPO_TOKEN (PAT s přístupem k BE repu). Bez toho checkout
    # privátního BE repa selže ('Not Found') a shodí CI. Zapni, až máš token.
    if: ${{ vars.ENABLE_CROSSREPO_AUDIT == 'true' }}
    steps:
      - uses: actions/checkout@v4                    # FE do ./

      - uses: actions/checkout@v4                    # BE vedle
        with:
          repository: Tykyen/Projekt-ikaros
          path: be-repo
          token: ${{ secrets.BE_REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 23.7 — route scanner v `--ci` režimu (reálný FE↔BE route drift shodí CI;
      # po vylepšení resolveru 0 falešných pozitiv). ws/config jsou informativní
      # (nemají exit gate), errors/logs shodí na porušení kontraktu/hygieny.
      - name: Contract scanners (routes/ws/config/errors/logs)
        env:
          IKAROS_BE_ROOT: ${{ github.workspace }}/be-repo
        run: |
          npm run audit:routes -- --ci
          npm run audit:ws
          npm run audit:config
          npm run audit:errors
          npm run audit:logs

      # B4 — anti-regression guard: opravený důležitý nález nesmí ztratit živou pojistku.
      - name: Anti-regression guard
        env:
          IKAROS_BE_ROOT: ${{ github.workspace }}/be-repo
        run: npm run audit:regression -- --ci
