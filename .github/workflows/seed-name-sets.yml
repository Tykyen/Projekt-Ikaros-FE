name: Seed jmenné sady (generátory)

# Jednorázový import jmenných sad (Morvol + státy světa, ~76 sad) do PROD
# Mongo. Data: autorův Generátor jmen Morvol.xlsx + Wikidata (CC0). Spustí se
# ručně (Actions -> Run workflow). Idempotentní — opakované spuštění smaže
# předchozí seed (dle seedTag) a vloží znovu; ručně vytvořených sad se
# nedotkne. Nutné až PO deployi BE (kolekce name_sets).

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy migration files to server
        run: |
          scp -P ${{ vars.SERVER_PORT }} scripts/seed-migrace/name-sets-seed.json ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }}:/tmp/name-sets-seed.json
          scp -P ${{ vars.SERVER_PORT }} scripts/seed-migrace/name-sets-import.js ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }}:/tmp/name-sets-import.js

      - name: Import into prod Mongo (via BE container)
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "docker cp /tmp/name-sets-seed.json projekt-ikaros-be:/tmp/name-sets-seed.json && docker cp /tmp/name-sets-import.js projekt-ikaros-be:/app/name-sets-import.js && docker exec -w /app -e SEED_JSON=/tmp/name-sets-seed.json projekt-ikaros-be node name-sets-import.js"
