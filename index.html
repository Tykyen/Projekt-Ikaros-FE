<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projekt Ikaros</title>

    <!-- Pre-hydration: nastaví data-theme před React render → žádný FOUT -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('ikaros.theme');
          var id = raw ? JSON.parse(raw) : 'modre-nebe';
          if (typeof id !== 'string') id = 'modre-nebe';
          document.documentElement.setAttribute('data-theme', id);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'modre-nebe');
        }
      })();
    </script>

    <!-- Base body fonty — preload (Lora) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
