<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projekt Ikaros</title>

    <!-- Pre-hydration: nastaví data-theme před React render → žádný FOUT -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('ikaros.theme');
          var id = raw ? JSON.parse(raw) : 'modre-nebe';
          if (typeof id !== 'string') id = 'modre-nebe';
          document.documentElement.setAttribute('data-theme', id);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'modre-nebe');
        }
      })();
    </script>

    <!-- Base fonty — Cinzel (display), Cinzel Decorative (logo), Great Vibes (script), Lora (body),
                       Orbitron + Rajdhani (sci-fi 1.0d).
         1.0j font diferenciace pergamen / příroda / hospoda:
           • Pergamen:  UnifrakturMaguntia (display gotický blackletter), EB Garamond (body), IM Fell English (script)
           • Příroda:   Cormorant Garamond italic (display organic), Crimson Text (body), Tangerine (script)
           • Hospoda:   Pirata One (display carved tavern sign), Almendra (logo folkový), Henny Penny (atmosféra), Spectral (body)
         1.0k font diferenciace nemrtví:
           • Nemrtví:   UnifrakturCook (logo blackletter), New Rocker (display Dark Souls UI), IM Fell DW Pica (body letterpress) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Henny+Penny&family=IM+Fell+DW+Pica:ital@0;1&family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=Italianno&family=Lora:ital,wght@0,400;0,700;1,400&family=New+Rocker&family=Orbitron:wght@400;500;600;700&family=Petit+Formal+Script&family=Pinyon+Script&family=Pirata+One&family=Rajdhani:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Tangerine:wght@400;700&family=UnifrakturCook:wght@700&family=UnifrakturMaguntia&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
