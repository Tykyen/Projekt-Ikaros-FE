# 23.6 (LH-05, FE polovina) — rotace logů. Bez `logging:` bloku používá Docker
# default json-file BEZ stropu → nginx access log roste donekonečna.
# max 3× 10 MB na službu, stejná politika jako BE compose.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: projekt-ikaros-fe
    restart: unless-stopped
    logging: *default-logging
    # 14.3 — runtime env pro nginx CSP (envsubst v default.conf.template):
    #   BACKEND_HOST    = holý host backendu (connect-src/img-src), odvozeno z VITE_API_URL při deployi
    #   CSP_HEADER_NAME = enforce (default po doladění); rollback na report-only přes GitHub var
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-}
      CSP_HEADER_NAME: ${CSP_HEADER_NAME:-Content-Security-Policy}
      # 15B.1 — host:port prerender sidecaru pro nginx upstream.
      PRERENDER_HOST: ${PRERENDER_HOST:-prerender:3000}
      # 23.4 — holý Sentry ingest host pro CSP connect-src, odvozeno z VITE_SENTRY_DSN při deployi.
      SENTRY_HOST: ${SENTRY_HOST:-}
    # 23.6 — POZOR: NEbindovat na 127.0.0.1! Server je za NAT poskytovatele
    # (jen privátní IP); TLS ukončuje edge proxy na JINÉM stroji a sem chodí
    # po interní síti → loopback bind by odřízl produkci. Port není veřejný
    # (NAT ho nepouští, ověřeno 2026-07-19); zbytkové riziko interní sítě
    # řeší runbook §1 / karta 30.5.
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    # nginx resolvuje upstream `prerender` při startu → sidecar musí existovat dřív.
    depends_on:
      - prerender

  # 15B.1 — prerender sidecar: pro crawlery renderuje SPA jako hotové HTML
  # (headless Chromium). Žádný host port — volá ho jen frontend přes interní síť.
  prerender:
    build:
      context: ./prerender
      dockerfile: Dockerfile
    container_name: projekt-ikaros-prerender
    restart: unless-stopped
    logging: *default-logging
    environment:
      # interní adresa SPA (nginx), kam chodí headless prohlížeč pro stránky
      FRONTEND_INTERNAL: http://frontend:80
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

