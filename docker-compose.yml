# 23.6 (LH-05, FE polovina) — rotace logů. Bez `logging:` bloku používá Docker
# default json-file BEZ stropu → nginx access log roste donekonečna.
# max 3× 10 MB na službu, stejná politika jako BE compose.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: projekt-ikaros-fe
    restart: unless-stopped
    logging: *default-logging
    # 14.3 — runtime env pro nginx CSP (envsubst v default.conf.template):
    #   BACKEND_HOST    = holý host backendu (connect-src/img-src), odvozeno z VITE_API_URL při deployi
    #   CSP_HEADER_NAME = enforce (default po doladění); rollback na report-only přes GitHub var
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-}
      CSP_HEADER_NAME: ${CSP_HEADER_NAME:-Content-Security-Policy}
      # 15B.1 — host:port prerender sidecaru pro nginx upstream.
      PRERENDER_HOST: ${PRERENDER_HOST:-prerender:3000}
      # 23.4 — holý Sentry ingest host pro CSP connect-src, odvozeno z VITE_SENTRY_DSN při deployi.
      SENTRY_HOST: ${SENTRY_HOST:-}
    # 23.6 — POZOR: NEbindovat na 127.0.0.1! Server je za NAT poskytovatele
    # (jen privátní IP); TLS ukončuje edge proxy na JINÉM stroji a sem chodí
    # po interní síti → loopback bind by odřízl produkci. Port není veřejný
    # (NAT ho nepouští, ověřeno 2026-07-19); interní síť zavřená přes iptables
    # DOCKER-USER (runbook §1, systemd docker-user-hardening).
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    # nginx resolvuje upstream `prerender` při startu → sidecar musí existovat dřív.
    depends_on:
      - prerender

  # 15B.1 — prerender sidecar: pro crawlery renderuje SPA jako hotové HTML
  # (headless Chromium). Žádný host port — volá ho jen frontend přes interní síť.
  prerender:
    build:
      context: ./prerender
      dockerfile: Dockerfile
    container_name: projekt-ikaros-prerender
    restart: unless-stopped
    logging: *default-logging
    environment:
      # interní adresa SPA (nginx), kam chodí headless prohlížeč pro stránky
      FRONTEND_INTERNAL: http://frontend:80
      # 24.2 — po kolika renderech Chromium recyklovat (0 = nikdy). Headless
      # Chromium při dlouhém běhu roste; sdílená instance jinak žije, dokud
      # nespadne. Recyklace řeší PŘÍČINU, mem_limit níž je jen zábrana.
      #
      # 200 → 50 (2026-07-20, po prvním měření): `docker stats` ukázal 419 MiB
      # z 768MiB limitu (54,6 %) po ~11 renderech — karta přitom počítala s
      # „Chromium ~150–300 MB". Jestli RSS s počtem renderů roste, 200 renderů
      # by se do stropu nemuselo vejít. Recyklace je levná (Chromium startuje
      # 1–2 s a čeká na ni jen crawler, ne uživatel; cache HIT se jí netýká),
      # takže radši častěji. POZOR: jeden snímek trend nedokazuje — až druhé
      # měření řekne, jestli šlo o růst, nebo o baseline Chromia.
      RECYCLE_AFTER: ${PRERENDER_RECYCLE_AFTER:-50}
    # 24.2 — strop paměti. Sidecar dosud běžel bez limitu na stroji, kde BE drží
    # RSS ~2,4 GB baseline (ONNX embedding) → ujetý Chromium by tlačil na celý
    # host. 768m je velkorysá POJISTKA, ne přesné ladění: doladí se podle měření
    # z `server-check.yml` (krok „docker stats"). Při dosažení stropu kernel
    # kontejner zabije a `restart: unless-stopped` ho zvedne — proto je limit
    # bezpečnější než jeho absence, i kdyby byl trochu nízký.
    mem_limit: 768m
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

